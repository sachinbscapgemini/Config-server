server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/configserver_db
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9091/eureka/

custom:
  app-name: Product Service
